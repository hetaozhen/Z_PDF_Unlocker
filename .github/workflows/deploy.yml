name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 1. 自动构建 Docker 镜像并推送至 Docker Hub
  docker-build-push:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/z-pdf-unlocker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 自动构建 Windows 编译的单个 EXE 绿色版，并在发布 Tag 时自动创建 GitHub Release 上传
  windows-release:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Package Application
        run: |
          pyinstaller --onefile --name=Z_PDF_Unlocker --icon="static/favicon.ico" --add-data "templates;templates" --add-data "static;static" app.py

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Z_PDF_Unlocker.exe
          name: Z_PDF_Unlocker Release ${{ github.ref_name }}
          body: |
            ## Z_PDF_Unlocker Release ${{ github.ref_name }}
            
            这是 Z_PDF_Unlocker 的最新发布版本。
            
            ### 包含组件：
            - **Z_PDF_Unlocker.exe**: Windows 单文件绿色免安装版本（双击直接运行）。
            - **Docker 镜像**: `docker pull ${{ secrets.DOCKER_USERNAME }}/z-pdf-unlocker:${{ github.ref_name }}`。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
